<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クロコ インストール 完了チェック</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: #f5f0eb;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #8b4513;
      color: white;
      padding: 20px 16px 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.3rem; margin-bottom: 4px; }
    header p { font-size: 0.8rem; opacity: 0.85; }

    /* 進捗バー */
    .progress-wrap {
      background: rgba(255,255,255,0.25);
      height: 6px;
      margin-top: 10px;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #ffd700;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 0.75rem;
      opacity: 0.9;
      margin-top: 4px;
      text-align: right;
    }

    /* ステップナビ */
    .step-nav {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      overflow-x: auto;
      background: #e8e0d8;
      -webkit-overflow-scrolling: touch;
    }
    .step-nav::-webkit-scrollbar { display: none; }
    .step-dot {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid #c0b8b0;
      background: white;
      color: #999;
      transition: all 0.2s;
    }
    .step-dot.done { background: #4caf50; border-color: #4caf50; color: white; }
    .step-dot.partial { background: #ff9800; border-color: #ff9800; color: white; }
    .step-dot.active { border-color: #8b4513; color: #8b4513; font-weight: bold; }

    /* OS選択 */
    .os-card {
      background: white;
      margin: 12px 16px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .os-label { font-size: 0.75rem; color: #888; margin-bottom: 6px; }
    .os-title { font-weight: bold; margin-bottom: 12px; font-size: 1rem; }
    .os-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .os-btn {
      padding: 12px;
      border: 2px solid #d4c9bc;
      border-radius: 10px;
      background: #ede8e2;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
    }
    .os-btn.selected { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }

    /* ステップカード */
    .step-card {
      background: white;
      margin: 10px 16px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .step-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
    }
    .step-badge {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      background: #ede8e2;
      color: #999;
      border: 2px solid #d4c9bc;
    }
    .step-badge.done { background: #4caf50; border-color: #4caf50; color: white; }
    .step-badge.partial { background: #ff9800; border-color: #ff9800; color: white; }

    .step-info { flex: 1; }
    .step-num { font-size: 0.72rem; color: #888; }
    .step-title { font-weight: bold; font-size: 0.95rem; }
    .step-progress { font-size: 0.75rem; color: #aaa; margin-top: 2px; }
    .step-progress.done { color: #4caf50; }
    .step-progress.partial { color: #ff9800; }

    .step-arrow {
      font-size: 0.9rem;
      color: #aaa;
      transition: transform 0.2s;
    }
    .step-arrow.open { transform: rotate(180deg); }

    .step-body {
      border-top: 1px solid #f0ebe5;
      padding: 14px 16px;
      display: none;
    }
    .step-body.open { display: block; }

    /* チェックアイテム */
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f5f0eb;
      cursor: pointer;
    }
    .check-item:last-child { border-bottom: none; }
    .check-item:hover { background: #faf7f4; margin: 0 -16px; padding-left: 16px; padding-right: 16px; }

    .check-box {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #d4c9bc;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.15s;
    }
    .check-box.checked { background: #4caf50; border-color: #4caf50; }
    .check-box.checked::after { content: "✓"; color: white; font-size: 13px; font-weight: bold; }

    .check-text {
      flex: 1;
      font-size: 0.88rem;
      line-height: 1.5;
      color: #444;
    }
    .check-text.checked { color: #aaa; text-decoration: line-through; }

    .check-note {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 2px;
    }

    .os-only { display: none; }
    .os-only.show { display: flex; }

    /* アラート */
    .step-alert {
      background: #fff0e0;
      border-left: 3px solid #ff9800;
      border-radius: 0 6px 6px 0;
      padding: 8px 10px;
      font-size: 0.8rem;
      color: #e65100;
      margin-top: 10px;
      line-height: 1.5;
      display: none;
    }
    .step-alert.show { display: block; }

    /* 完了セクション */
    .draft-card {
      background: white;
      margin: 12px 16px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .draft-heading {
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      border: 2px solid #d4c9bc;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.82rem;
      line-height: 1.8;
      color: #444;
      resize: vertical;
      background: #faf7f4;
      font-family: inherit;
    }
    .action-btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.85; }
    .btn-copy { background: #8b4513; color: white; }
    .btn-reset { background: white; color: #888; border: 2px solid #d4c9bc; }

    .summary-banner {
      margin: 12px 16px 0;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: bold;
      text-align: center;
    }
    .summary-banner.all-done { background: #e8f5e9; color: #2e7d32; }
    .summary-banner.partial { background: #fff3e0; color: #e65100; }

    footer {
      text-align: center;
      font-size: 0.72rem;
      color: #bbb;
      padding: 24px 16px;
    }
  </style>
</head>
<body>

<header>
  <h1>クロコ インストール 完了チェック</h1>
  <p>ステップ0〜8を順番に確認してください</p>
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText">0 / 0 項目完了</div>
</header>

<div class="step-nav" id="stepNav"></div>

<!-- OS選択 -->
<div class="os-card">
  <div class="os-label">まず確認</div>
  <div class="os-title">パソコンの種類を選んでください</div>
  <div class="os-btn-group">
    <button class="os-btn" id="btnMac" onclick="selectOS('mac')">Mac</button>
    <button class="os-btn" id="btnWin" onclick="selectOS('windows')">Windows</button>
  </div>
</div>

<div id="stepsContainer"></div>

<div id="summaryBanner" class="summary-banner" style="display:none"></div>

<div class="draft-card">
  <div class="draft-heading">📋 チャットに貼り付ける報告文</div>
  <textarea id="draftText" readonly>すべての項目にチェックを入れると、ここに報告文が表示されます。</textarea>
  <button class="action-btn btn-copy" onclick="copyDraft()">コピーする</button>
  <button class="action-btn btn-reset" onclick="resetAll()">リセット</button>
</div>

<footer>クロコ オフ会チェックシート</footer>

<script>
let selectedOS = null;

const STEPS = [
  {
    num: 1,
    title: "スクリーンショットの練習",
    items: [
      { id: "s1_mac_area", text: "範囲選択で撮影できた（Command + Shift + 4）", osOnly: "mac" },
      { id: "s1_win_snip", text: "スニッピングツールが開いた（Windows + Shift + S）", osOnly: "windows" },
      { id: "s1_paste",    text: "撮影した画像をクロコのチャット欄に貼り付けできた" },
    ],
    alert: "スクリーンショットは困ったときの命綱です。スタッフに声をかけて一緒に練習しましょう。"
  },
  {
    num: 3,
    title: "Git のインストール",
    items: [
      { id: "s3_ver", text: "git --version を実行してバージョン番号が表示された", note: "例：git version 2.xx.x　／　エラーが出た場合はスタッフへ" },
    ],
    alert: "エラーが出た場合はスタッフに声をかけてください。インストールをサポートします。"
  },
  {
    num: 5,
    title: "クロコのインストールと起動",
    items: [
      { id: "s5_mac_launch", text: "アプリケーションフォルダから「Claude」を起動できた", osOnly: "mac" },
      { id: "s5_win_start",  text: "スタートメニューに「Claude」が追加されて起動できた", osOnly: "windows" },
    ],
    alert: "起動できない場合はスタッフに声をかけてください。"
  },
  {
    num: 7,
    title: "後片付け（重要！）",
    items: [
      { id: "s7_mac_del",   text: "Claude の .dmg ファイルを削除した（ゴミ箱へ）", osOnly: "mac" },
      { id: "s7_mac_eject", text: "デスクトップの .dmg ディスクアイコンを取り出した", osOnly: "mac", note: "右クリック → 取り出す" },
      { id: "s7_win_del",   text: "Claude の .exe ファイルを削除した（ゴミ箱へ）", osOnly: "windows" },
    ],
  },
  {
    num: 8,
    title: "コストと制限の理解",
    items: [
      { id: "s8_plan",    text: "クロコの利用プランを確認した", note: "無料：1日の上限あり / Pro（$20/月）：より多く使える" },
      { id: "s8_usage",   text: "今日の残り使用量を確認する方法を覚えた" },
      { id: "s8_save",    text: "節約術を覚えた", note: "長い会話は新しいチャットを始める・不要なファイルを読み込ませない" },
      { id: "s8_gakucho", text: "学長のセキュリティのおまじないをやった" },
    ]
  },
];

let checks = {};

function selectOS(os) {
  selectedOS = os;
  document.getElementById("btnMac").classList.toggle("selected", os === "mac");
  document.getElementById("btnWin").classList.toggle("selected", os === "windows");
  renderSteps();
}

function getVisibleItems(step) {
  return step.items.filter(item => {
    if (!item.osOnly) return true;
    return item.osOnly === selectedOS;
  });
}

function getStepStats(step) {
  const items = getVisibleItems(step);
  const done = items.filter(item => checks[item.id]).length;
  return { done, total: items.length };
}

function renderSteps() {
  const container = document.getElementById("stepsContainer");
  container.innerHTML = "";

  const nav = document.getElementById("stepNav");
  nav.innerHTML = "";

  let totalDone = 0;
  let totalAll = 0;

  STEPS.forEach(step => {
    const { done, total } = getStepStats(step);
    totalDone += done;
    totalAll += total;

    // ナビドット
    const dot = document.createElement("div");
    dot.className = "step-dot" + (done === total && total > 0 ? " done" : done > 0 ? " partial" : "");
    dot.textContent = step.num;
    dot.title = step.title;
    dot.onclick = () => {
      const el = document.getElementById("step-" + step.num);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    };
    nav.appendChild(dot);

    const { done: d, total: t } = getStepStats(step);
    const allDone = d === t && t > 0;
    const anyDone = d > 0;

    const card = document.createElement("div");
    card.className = "step-card";
    card.id = "step-" + step.num;

    const bodyId = "body-" + step.num;
    const arrowId = "arrow-" + step.num;

    const badgeClass = allDone ? "done" : anyDone ? "partial" : "";
    const badgeText = allDone ? "✓" : anyDone ? "…" : step.num;
    const progressClass = allDone ? "done" : anyDone ? "partial" : "";
    const progressText = allDone ? "完了！" : anyDone ? `${d} / ${t} 項目` : `${t} 項目`;

    card.innerHTML = `
      <div class="step-header" onclick="toggleStep('${bodyId}','${arrowId}')">
        <div class="step-badge ${badgeClass}">${badgeText}</div>
        <div class="step-info">
          <div class="step-num">ステップ ${step.num}</div>
          <div class="step-title">${step.title}</div>
          <div class="step-progress ${progressClass}">${progressText}</div>
        </div>
        <div class="step-arrow" id="${arrowId}">▼</div>
      </div>
      <div class="step-body" id="${bodyId}">
        ${renderItems(step)}
        ${step.alert ? `<div class="step-alert" id="alert-${step.num}">${step.alert}</div>` : ""}
      </div>
    `;

    container.appendChild(card);
  });

  // 進捗更新
  const pct = totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${totalDone} / ${totalAll} 項目完了`;

  updateDraft();
  updateAlerts();
  updateSummaryBanner(totalDone, totalAll);
}

function renderItems(step) {
  const items = getVisibleItems(step);
  return items.map(item => {
    const checked = checks[item.id] || false;
    return `
      <div class="check-item" onclick="toggleCheck('${item.id}')">
        <div class="check-box ${checked ? 'checked' : ''}"></div>
        <div>
          <div class="check-text ${checked ? 'checked' : ''}">${item.text}</div>
          ${item.note ? `<div class="check-note">${item.note}</div>` : ""}
        </div>
      </div>
    `;
  }).join("");
}

function toggleStep(bodyId, arrowId) {
  const body = document.getElementById(bodyId);
  const arrow = document.getElementById(arrowId);
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open", !isOpen);
  arrow.classList.toggle("open", !isOpen);
}

function toggleCheck(id) {
  checks[id] = !checks[id];
  renderSteps();
}

function updateAlerts() {
  STEPS.forEach(step => {
    if (!step.alert) return;
    const alertEl = document.getElementById("alert-" + step.num);
    if (!alertEl) return;
    const { done, total } = getStepStats(step);
    // 1項目でもチェックしていて、まだ全部終わっていない場合にアラート表示
    alertEl.classList.toggle("show", done > 0 && done < total);
  });
}

function updateSummaryBanner(done, total) {
  const banner = document.getElementById("summaryBanner");
  if (total === 0) { banner.style.display = "none"; return; }
  banner.style.display = "block";
  if (done === total) {
    banner.className = "summary-banner all-done";
    banner.textContent = "🎉 全ステップ完了！お疲れさまでした！";
  } else {
    banner.className = "summary-banner partial";
    banner.textContent = `残り ${total - done} 項目があります。スタッフに声をかけても大丈夫です！`;
  }
}

function updateDraft() {
  const osLabel = selectedOS === "mac" ? "Mac" : selectedOS === "windows" ? "Windows" : "未選択";

  const lines = ["【クロコ インストール完了チェック】", `OS：${osLabel}`, ""];

  STEPS.forEach(step => {
    const items = getVisibleItems(step);
    const done = items.filter(i => checks[i.id]).length;
    const total = items.length;
    const mark = done === total && total > 0 ? "✅" : done > 0 ? "⚠️" : "⬜";
    lines.push(`${mark} ステップ${step.num}：${step.title}（${done}/${total}）`);
  });

  const totalItems = STEPS.flatMap(s => getVisibleItems(s));
  const totalDone = totalItems.filter(i => checks[i.id]).length;
  const total = totalItems.length;

  lines.push("");
  if (totalDone === total && total > 0) {
    lines.push("全ステップ完了しました！");
  } else {
    lines.push(`進捗：${totalDone} / ${total} 項目完了`);
    const ngSteps = STEPS.filter(s => {
      const { done, total } = getStepStats(s);
      return done < total;
    }).map(s => `ステップ${s.num}`);
    if (ngSteps.length > 0) {
      lines.push(`未完了：${ngSteps.join("、")}`);
    }
  }

  document.getElementById("draftText").value = lines.join("\n");
}

function copyDraft() {
  const text = document.getElementById("draftText").value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(".btn-copy");
    btn.textContent = "コピーしました！";
    setTimeout(() => { btn.textContent = "コピーする"; }, 2000);
  });
}

function resetAll() {
  checks = {};
  selectedOS = null;
  document.getElementById("btnMac").classList.remove("selected");
  document.getElementById("btnWin").classList.remove("selected");
  renderSteps();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// 初期表示
renderSteps();
</script>
</body>
</html>
