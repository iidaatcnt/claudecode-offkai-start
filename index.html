<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クロコ インストール 完了チェック</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      background: #f5e8cc;
      color: #3a2a1a;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: #7a5020;
      color: white;
      padding: 18px 16px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    header h1 { font-size: 1.25rem; font-weight: bold; margin-bottom: 4px; }
    header p  { font-size: 0.78rem; opacity: 0.85; }

    .progress-wrap {
      background: rgba(255,255,255,0.3);
      height: 5px;
      margin-top: 10px;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #f5c842;
      border-radius: 3px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 0.72rem;
      opacity: 0.9;
      margin-top: 4px;
      text-align: right;
    }

    /* OS選択 */
    .os-section {
      background: #fdf5e4;
      border-bottom: 1px solid #e0c898;
      padding: 14px 16px;
    }
    .os-label { font-size: 0.72rem; color: #8a6a30; font-weight: bold; margin-bottom: 8px; letter-spacing: 0.05em; }
    .os-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .os-btn {
      padding: 11px 8px;
      border: 2px solid #c8aa78;
      border-radius: 8px;
      background: white;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      color: #5a4020;
      transition: all 0.15s;
    }
    .os-btn:hover { background: #fdf0d5; }
    .os-btn.selected {
      background: #1a6fc4;
      border-color: #1a6fc4;
      color: white;
    }

    /* 進捗サマリ */
    .progress-summary {
      padding: 10px 16px;
      font-size: 0.8rem;
      color: #7a5020;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e0c898;
      background: #fdf5e4;
    }
    .filter-label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .filter-label input { accent-color: #1a6fc4; width: 15px; height: 15px; cursor: pointer; }
    .remain-badge {
      font-weight: bold;
      background: #e8a020;
      color: white;
      border-radius: 10px;
      padding: 2px 10px;
      font-size: 0.78rem;
    }

    /* ステップグループ */
    .step-group {
      margin: 10px 12px 0;
    }
    .step-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px 4px;
    }
    .step-group-title {
      font-size: 0.72rem;
      font-weight: bold;
      color: #8a6030;
      letter-spacing: 0.06em;
    }
    .step-group-badge {
      font-size: 0.7rem;
      color: #aaa;
    }

    /* チェック行 */
    .check-row {
      display: flex;
      align-items: stretch;
      background: #fdf5e4;
      border: 1px solid #e0c898;
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.12s;
    }
    .check-row:hover { background: #fef8ed; }
    .check-row.done { background: #fdf5e4; }

    /* 左帯 */
    .row-accent {
      width: 36px;
      flex-shrink: 0;
      background: #7a5020;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
      gap: 3px;
    }
    .accent-text {
      color: white;
      font-size: 0.58rem;
      font-weight: bold;
      writing-mode: vertical-rl;
      letter-spacing: 0.1em;
    }

    /* チェックボックス */
    .row-check {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
    }
    .checkbox-ui {
      width: 26px;
      height: 26px;
      border: 2px solid #1a6fc4;
      border-radius: 6px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .checkbox-ui.checked {
      background: #1a6fc4;
      border-color: #1a6fc4;
    }
    .checkbox-ui.checked::after {
      content: "";
      display: block;
      width: 7px;
      height: 12px;
      border-right: 2.5px solid white;
      border-bottom: 2.5px solid white;
      transform: rotate(45deg) translateY(-2px);
    }

    /* テキスト部分 */
    .row-content {
      flex: 1;
      padding: 12px 8px 12px 4px;
      min-width: 0;
    }
    .row-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: bold;
      color: #7a5020;
      border: 1.5px solid #c8aa78;
      border-radius: 4px;
      padding: 1px 6px;
      margin-bottom: 4px;
      background: white;
    }
    .row-text {
      font-size: 0.9rem;
      line-height: 1.45;
      color: #3a2a1a;
    }
    .row-text.done { color: #aaa; text-decoration: line-through; }
    .row-note {
      font-size: 0.72rem;
      color: #9a7a50;
      margin-top: 3px;
      line-height: 1.4;
    }

    /* アラート */
    .step-alert {
      background: #fff4e0;
      border-left: 3px solid #e8a020;
      border-radius: 0 6px 6px 0;
      padding: 8px 12px;
      margin: 0 12px 8px;
      font-size: 0.8rem;
      color: #a06010;
      line-height: 1.5;
      display: none;
    }
    .step-alert.show { display: block; }

    /* 報告文エリア */
    .draft-section {
      margin: 14px 12px;
      background: #fdf5e4;
      border: 1px solid #e0c898;
      border-radius: 10px;
      overflow: hidden;
    }
    .draft-header {
      background: #7a5020;
      color: white;
      padding: 10px 14px;
      font-size: 0.88rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .draft-body { padding: 12px 14px; }
    .summary-status {
      font-size: 0.88rem;
      font-weight: bold;
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      text-align: center;
    }
    .status-done    { background: #e8f5e9; color: #2e7d32; }
    .status-partial { background: #fff8e1; color: #e65100; }
    textarea {
      width: 100%;
      min-height: 200px;
      border: 1.5px solid #d4b878;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.82rem;
      line-height: 1.8;
      color: #3a2a1a;
      resize: vertical;
      background: white;
      font-family: inherit;
    }
    .btn-copy {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: #1a6fc4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-copy:hover { opacity: 0.88; }
    .btn-reset {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: white;
      color: #8a6030;
      border: 1.5px solid #c8aa78;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-reset:hover { background: #fdf0d5; }

    footer {
      text-align: center;
      font-size: 0.7rem;
      color: #b09060;
      padding: 20px 16px 32px;
    }
  </style>
</head>
<body>

<header>
  <h1>クロコ インストール 完了チェック</h1>
  <p>ステップ1・3・5・7・8を順番に確認してください</p>
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText">0 / 0 項目完了</div>
</header>

<!-- OS選択 -->
<div class="os-section">
  <div class="os-label">▼ まずパソコンの種類を選んでください</div>
  <div class="os-btn-group">
    <button class="os-btn" id="btnMac" onclick="selectOS('mac')">Mac</button>
    <button class="os-btn" id="btnWin" onclick="selectOS('windows')">Windows</button>
  </div>
</div>

<!-- 未完了フィルター -->
<div class="progress-summary">
  <label class="filter-label">
    <input type="checkbox" id="filterIncomplete" onchange="renderSteps()">
    未完了のみ表示
  </label>
  <span class="remain-badge" id="remainBadge">残り — 件</span>
</div>

<div id="stepsContainer"></div>

<!-- 報告文 -->
<div class="draft-section">
  <div class="draft-header">📋 チャットに貼り付ける報告文</div>
  <div class="draft-body">
    <div class="summary-status status-partial" id="summaryStatus">すべての項目にチェックを入れると完了になります</div>
    <textarea id="draftText" readonly></textarea>
    <button class="btn-copy" onclick="copyDraft()">コピーする</button>
    <button class="btn-reset" onclick="resetAll()">リセット</button>
  </div>
</div>

<footer>クロコ オフ会チェックシート</footer>

<script>
let selectedOS = "mac";
let checks = {};

const STEPS = [
  {
    num: 1,
    title: "スクリーンショットの練習",
    tag: "ステップ１",
    items: [
      { id: "s1_mac_area", text: "範囲選択で撮影できた（Command + Shift + 4）", osOnly: "mac" },
      { id: "s1_win_snip", text: "スニッピングツールが開いた（Windows + Shift + S）", osOnly: "windows" },
      { id: "s1_paste",    text: "撮影した画像をクロコのチャット欄に貼り付けできた" },
    ],
    alert: "スクリーンショットは困ったときの命綱です。スタッフに声をかけて一緒に練習しましょう。"
  },
  {
    num: 3,
    title: "Git のインストール",
    tag: "ステップ３",
    items: [
      { id: "s3_ver", text: "git --version を実行してバージョン番号が表示された", note: "例：git version 2.xx.x　／　エラーが出た場合はスタッフへ" },
    ],
    alert: "エラーが出た場合はスタッフに声をかけてください。インストールをサポートします。"
  },
  {
    num: 5,
    title: "クロコのインストールと起動",
    tag: "ステップ５",
    items: [
      { id: "s5_mac_launch", text: "アプリケーションフォルダから「Claude」を起動できた", osOnly: "mac" },
      { id: "s5_win_start",  text: "スタートメニューに「Claude」が追加されて起動できた", osOnly: "windows" },
    ],
    alert: "起動できない場合はスタッフに声をかけてください。"
  },
  {
    num: 7,
    title: "後片付け（重要！）",
    tag: "ステップ７",
    items: [
      { id: "s7_mac_del",   text: "Claude の .dmg ファイルを削除した（ゴミ箱へ）", osOnly: "mac" },
      { id: "s7_mac_eject", text: "デスクトップの .dmg ディスクアイコンを取り出した", osOnly: "mac", note: "右クリック → 取り出す" },
      { id: "s7_win_del",   text: "Claude の .exe ファイルを削除した（ゴミ箱へ）", osOnly: "windows" },
    ],
  },
  {
    num: 8,
    title: "コストと制限の理解",
    tag: "ステップ８",
    items: [
      { id: "s8_plan",    text: "クロコの利用プランを確認した", note: "無料：1日の上限あり / Pro（$22/月）：より多く使える" },
      { id: "s8_usage",   text: "今日の残り使用量を確認する方法を覚えた" },
      { id: "s8_save",    text: "節約術を覚えた", note: "長い会話は新しいチャットを始める・不要なファイルを読み込ませない" },
      { id: "s8_gakucho", text: "学長のセキュリティのおまじないをやった" },
    ]
  },
];

function getVisibleItems(step) {
  return step.items.filter(item => !item.osOnly || item.osOnly === selectedOS);
}

function getStepStats(step) {
  const items = getVisibleItems(step);
  const done = items.filter(i => checks[i.id]).length;
  return { done, total: items.length };
}

function selectOS(os) {
  selectedOS = os;
  document.getElementById("btnMac").classList.toggle("selected", os === "mac");
  document.getElementById("btnWin").classList.toggle("selected", os === "windows");
  renderSteps();
}

function renderSteps() {
  const container = document.getElementById("stepsContainer");
  container.innerHTML = "";
  const filterOnly = document.getElementById("filterIncomplete").checked;

  let totalDone = 0, totalAll = 0;

  STEPS.forEach(step => {
    const items = getVisibleItems(step);
    const done = items.filter(i => checks[i.id]).length;
    totalDone += done;
    totalAll += items.length;

    const group = document.createElement("div");
    group.className = "step-group";

    // ステップヘッダー
    const hdr = document.createElement("div");
    hdr.className = "step-group-header";
    hdr.innerHTML = `
      <span class="step-group-title">ステップ ${step.num}｜${step.title}</span>
      <span class="step-group-badge">${done}/${items.length}</span>
    `;
    group.appendChild(hdr);

    // 各チェック行
    items.forEach(item => {
      const isChecked = checks[item.id] || false;
      if (filterOnly && isChecked) return;

      const row = document.createElement("div");
      row.className = "check-row" + (isChecked ? " done" : "");
      row.onclick = () => toggleCheck(item.id);
      row.innerHTML = `
        <div class="row-accent">
          <span class="accent-text">必須</span>
        </div>
        <div class="row-check">
          <div class="checkbox-ui ${isChecked ? 'checked' : ''}"></div>
        </div>
        <div class="row-content">
          <div class="row-tag">${step.tag}</div>
          <div class="row-text ${isChecked ? 'done' : ''}">${item.text}</div>
          ${item.note ? `<div class="row-note">${item.note}</div>` : ""}
        </div>
      `;
      group.appendChild(row);
    });

    // アラート（途中の場合）
    if (step.alert) {
      const alert = document.createElement("div");
      alert.className = "step-alert" + (done > 0 && done < items.length ? " show" : "");
      alert.textContent = step.alert;
      group.appendChild(alert);
    }

    container.appendChild(group);
  });

  // 残り件数
  const remain = totalAll - totalDone;
  document.getElementById("remainBadge").textContent = `残り ${remain} 件`;
  document.getElementById("progressFill").style.width = totalAll > 0 ? (totalDone / totalAll * 100) + "%" : "0%";
  document.getElementById("progressText").textContent = `${totalDone} / ${totalAll} 項目完了`;

  updateDraft(totalDone, totalAll);
}

function toggleCheck(id) {
  checks[id] = !checks[id];
  renderSteps();
}

function updateDraft(totalDone, totalAll) {
  const osLabel = selectedOS === "mac" ? "Mac" : selectedOS === "windows" ? "Windows" : "未選択";
  const allDone = totalDone === totalAll && totalAll > 0;

  const statusEl = document.getElementById("summaryStatus");
  if (allDone) {
    statusEl.className = "summary-status status-done";
    statusEl.textContent = "🎉 全項目完了！お疲れさまでした！";
  } else {
    statusEl.className = "summary-status status-partial";
    statusEl.textContent = totalAll > 0
      ? `残り ${totalAll - totalDone} 項目があります`
      : "すべての項目にチェックを入れると完了になります";
  }

  const lines = ["【クロコ インストール完了チェック】", `OS：${osLabel}`, ""];
  STEPS.forEach(step => {
    const items = getVisibleItems(step);
    const done = items.filter(i => checks[i.id]).length;
    const total = items.length;
    const mark = done === total && total > 0 ? "✅" : done > 0 ? "⚠️" : "⬜";
    lines.push(`${mark} ステップ${step.num}：${step.title}（${done}/${total}）`);
  });
  lines.push("");
  lines.push(allDone ? "全ステップ完了しました！" : `進捗：${totalDone} / ${totalAll} 項目完了`);

  document.getElementById("draftText").value = lines.join("\n");
}

function copyDraft() {
  navigator.clipboard.writeText(document.getElementById("draftText").value).then(() => {
    const btn = document.querySelector(".btn-copy");
    btn.textContent = "コピーしました！";
    setTimeout(() => { btn.textContent = "コピーする"; }, 2000);
  });
}

function resetAll() {
  checks = {};
  selectedOS = "mac";
  document.getElementById("btnMac").classList.add("selected");
  document.getElementById("btnWin").classList.remove("selected");
  document.getElementById("filterIncomplete").checked = false;
  renderSteps();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("btnMac").classList.add("selected");
renderSteps();
</script>
</body>
</html>
